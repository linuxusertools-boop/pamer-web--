<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>itsKev_dev WA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&family=JetBrains+Mono:wght@700&family=Permanent+Marker&family=Gaegu:wght@700&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #FDFBF7; 
            background-image: radial-gradient(rgba(0, 0, 0, 0.05) 1.5px, transparent 0);
            background-size: 24px 24px;
            color: #1A1B26; 
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* Header */
        .header { 
            background-color: #ffffff; 
            padding: 14px 20px; 
            display: flex; 
            align-items: center; 
            border-bottom: 4px solid #1A1B26;
            z-index: 10; 
            flex-shrink: 0;
            position: relative;
        }

        .avatar { 
            width: 44px; 
            height: 44px; 
            background: #3B82F6; 
            color: white; 
            border: 3px solid #1A1B26;
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800; 
            font-style: italic;
            box-shadow: 3px 3px 0px #1A1B26;
        }

        .header-info { margin-left: 14px; flex: 1; }
        .header-info h1 { 
            font-family: 'Permanent Marker', cursive;
            font-size: 22px; 
            font-weight: 400; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            letter-spacing: -0.5px;
        }
        .header-info p { 
            font-family: 'Gaegu', cursive;
            font-size: 15px; 
            color: #555555; 
            font-weight: 700;
        }

        /* 3 Indikator Sistem */
        .window-dots {
            display: flex;
            gap: 6px;
            margin-left: auto;
            align-self: center;
        }

        .dot {
            width: 12px;
            height: 12px;
            border: 2px solid #1A1B26;
            border-radius: 50%;
        }
        .dot-red { background-color: #FF5F56; }
        .dot-yellow { background-color: #FFBD2E; }
        .dot-green { background-color: #27C93F; }

        /* Area Chat Grid */
        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            background-color: #f3f4f6;
            background-image: radial-gradient(rgba(59, 130, 246, 0.08) 1.5px, transparent 0);
            background-size: 18px 18px;
            display: flex; 
            flex-direction: column; 
            gap: 20px; /* Jarak antar bubble ditambah sedikit agar bayangan tidak tumpang tindih */
        }

        /* Base Desain Bubble Pesan & Stiker Serasi */
        .message { 
            max-width: 80%; 
            padding: 12px 16px; 
            font-size: 14.5px; 
            font-weight: 600;
            line-height: 1.5; 
            position: relative; 
            word-wrap: break-word; 
            border: 3px solid #1A1B26; /* Border Komik Tebal */
        }

        /* Pesan User (Kanan) */
        .user-msg { 
            align-self: flex-end; 
            background-color: #E0E7FF; 
            border-radius: 16px 16px 0px 16px; 
            box-shadow: 6px 6px 0px #1A1B26; /* Bayangan Komik Solid */
        }

        /* Pesan AI / System (Kiri) */
        .ai-msg { 
            align-self: flex-start; 
            background-color: #ffffff; 
            border-radius: 16px 16px 16px 0px; 
            box-shadow: -6px 6px 0px #1A1B26; /* Bayangan Kiri Komik Solid */
        }

        /* Sticker Container */
        .stc-msg { 
            background: transparent !important; 
            box-shadow: none !important; 
            padding: 0 !important; 
            border: none !important; 
            align-self: flex-start; 
        }

        /* Desain Stiker (Serasi dengan Bubble Pesan Komik) */
        .whatsapp-sticker { 
            width: 145px; 
            height: auto; 
            display: block; 
            margin: 4px 0; 
            border: 3px solid #1A1B26; /* Border Komik Tebal */
            border-radius: 16px;
            background-color: #ffffff;
            padding: 6px;
            box-shadow: -6px 6px 0px #1A1B26; /* Bayangan Solid Kiri serasi dengan AI msg */
        }

        /* Waktu / Timestamp */
        .time { 
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px; 
            color: #777777; 
            margin-top: 6px; 
            text-align: right; 
            display: block; 
            font-weight: 700;
        }
        .user-msg .time { color: #4f46e5; }

        /* Input Area */
        .input-area { 
            background-color: #ffffff; 
            padding: 16px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom)); 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            border-top: 4px solid #1A1B26;
            flex-shrink: 0;
        }

        input { 
            flex: 1; 
            background-color: #ffffff; 
            border: 3px solid #1A1B26; 
            padding: 14px 18px; 
            border-radius: 14px; 
            color: #1A1B26; 
            outline: none; 
            font-size: 14.5px; 
            font-weight: 600;
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.05);
        }
        input:focus {
            border-color: #3B82F6;
        }

        button { 
            background: #FFDE59; 
            border: 3px solid #1A1B26; 
            width: 48px; 
            height: 48px; 
            border-radius: 14px; 
            color: #1A1B26; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            flex-shrink: 0; 
            box-shadow: 3px 3px 0px #1A1B26;
            transition: all 0.15s ease;
        }
        button:hover {
            background: #ffea85;
        }
        button:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #1A1B26;
        }
        button:disabled { 
            opacity: 0.5; 
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="avatar">KD</div>
        <div class="header-info">
            <h1>itsKev_dev <svg viewBox="0 0 24 24" width="18" height="18" fill="#3B82F6" style="display:inline-block; vertical-align:middle;"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7l-3.8-3.8L7.7 11.5l2.4 2.4 5.6-5.6 1.4 1.4-7 7z"></path></svg></h1>
            <p>SYSTEM_ACTIVE</p>
        </div>
        <div class="window-dots">
            <div class="dot dot-red"></div>
            <div class="dot dot-yellow"></div>
            <div class="dot dot-green"></div>
        </div>
    </div>
    
    <div id="chat-container"></div>
    
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ketik instruksi sistem..." autocomplete="off">
        <button id="sendBtn"><svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path></svg></button>
    </div>
    
    <script src="script.js"></script>
<script src="../music.js"></script></body>
</html>
